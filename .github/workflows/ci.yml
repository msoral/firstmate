name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck bin/*.sh bin/backends/*.sh tests/*.sh

  tests:
    name: Behavior tests
    runs-on: ubuntu-latest
    # The suite should finish in ~2-3 minutes; this generous cap fails loudly on a
    # hung watcher or tmux test instead of riding GitHub's 360-minute default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check tmux for e2e tests
        run: |
          set -eu
          # zellij is now the default backend; tmux is an optional, still-selectable
          # backend, so its e2e/smoke tests skip gracefully when tmux is absent. Warn
          # rather than hard-fail so the suite runs on tmux-less hosts, while GitHub's
          # runners (which ship tmux) still exercise the real tmux coverage.
          if command -v tmux >/dev/null; then
            tmux -V
          else
            echo "::warning::tmux not found; tmux e2e/smoke tests will skip"
          fi
      - run: |
          set -eu
          for test_script in tests/*.test.sh; do
            "$test_script"
          done

  invariants:
    name: Repo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Symlinks must stay intact
        run: |
          set -eu
          [ "$(readlink CLAUDE.md)" = "AGENTS.md" ] || { echo "::error::CLAUDE.md must be a symlink to AGENTS.md"; exit 1; }
          [ "$(readlink .claude/skills)" = "../.agents/skills" ] || { echo "::error::.claude/skills must be a symlink to ../.agents/skills"; exit 1; }
      - name: Personal fleet paths must not be tracked
        run: |
          set -eu
          tracked=$(git ls-files -- data state config projects .no-mistakes)
          if [ -n "$tracked" ]; then
            echo "::error::Personal fleet paths are tracked in git:"
            printf '%s\n' "$tracked"
            exit 1
          fi
